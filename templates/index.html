<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Screener</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; margin:0; padding:15px; }
        .header { text-align:center; margin-bottom:20px; }
        .card {
            background: #16161f;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(135deg, #00d4aa, #00b894);
            color: black;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            width: 100%;
        }
        .signal { font-size: 32px; font-weight: bold; text-align:center; padding: 15px; border-radius: 12px; margin:15px 0; }
        .buy { background: #00c853; color: black; }
        .sell { background: #f44336; color: white; }
        .favorability {
            height: 12px;
            background: #333;
            border-radius: 999px;
            overflow: hidden;
            margin: 10px 0;
        }
        .bar { height: 100%; background: linear-gradient(to right, #00c853, #ffd700); }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 AI Chart Screener</h1>
        <p>Professional Signal Analyzer</p>
    </div>

    <div class="card">
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="fileInput" accept="image/*" style="margin-bottom:15px;" required>
            <button type="submit">Analyze Screenshot</button>
        </form>
    </div>

    <div id="result" class="card" style="display:none;"></div>
    <div id="result" style="margin-top:20px; color:white;"></div>

<script>
async function analyzeImage() {
    const fileInput = document.querySelector('input[type="file"]');
    const file = fileInput.files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    const response = await fetch("/analyze_image", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    document.getElementById("result").innerText = data.result;
}
</script>
    
</body>
</html>
