<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Screener</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; margin:0; padding:15px; }
        .header { text-align:center; margin-bottom:20px; }
        .card {
            background: #16161f;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(135deg, #00d4aa, #00b894);
            color: black;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            width: 100%;
        }
        .signal { font-size: 32px; font-weight: bold; text-align:center; padding: 15px; border-radius: 12px; margin:15px 0; }
        .buy { background: #00c853; color: black; }
        .sell { background: #f44336; color: white; }
        .favorability {
            height: 12px;
            background: #333;
            border-radius: 999px;
            overflow: hidden;
            margin: 10px 0;
        }
        .bar { height: 100%; background: linear-gradient(to right, #00c853, #ffd700); }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 AI Chart Screener</h1>
        <p>Professional Signal Analyzer</p>
    </div>

    <div class="card">
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="fileInput" accept="image/*" style="margin-bottom:15px;" required>
            <button type="submit">Analyze Screenshot</button>
        </form>
    </div>

    <div id="result" class="card" style="display:none;"></div>

<script>
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData();
    formData.append('file', document.getElementById('fileInput').files[0]);

    const div = document.getElementById('result');

    try {
        const res = await fetch('/upload', {
            method: 'POST',
            body: formData
        });

        // 🔥 THIS LINE FIXES YOUR BUG
        if (!res.ok) {
            const text = await res.text();
            throw new Error("Server error: " + text);
        }

        const data = await res.json();

        console.log("API RESPONSE:", data); // DEBUG

        if (data.error) {
            div.innerHTML = `<span style="color:red;">Error: ${data.error}</span>`;
            div.style.display = "block";
            return;
        }

        const isBullish = data.trend.toLowerCase().includes("up");

        div.innerHTML = `
            <h2>${data.signal}</h2>

            ${isBullish 
                ? '<div class="signal buy">🟢 BUY</div>' 
                : '<div class="signal sell">🔴 SELL</div>'}

            <p><strong>Trend:</strong> ${data.trend}</p>
            <p><strong>Strength:</strong> ${data.strength}</p>
            <p><strong>Patterns:</strong> ${data.patterns.join(", ")}</p>
            <p><strong>Zones:</strong> ${data.zones_detected}</p>
        `;

        div.style.display = "block";

    } catch (err) {
        console.error(err);
        div.innerHTML = `<span style="color:red;">Error: ${err.message}</span>`;
        div.style.display = "block";
    }
});
    </script>
    
</body>
</html>
