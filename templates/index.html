<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Screener</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; margin:0; padding:15px; }
        .header { text-align:center; margin-bottom:20px; }
        .card {
            background: #16161f;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        button {
            background: linear-gradient(135deg, #00d4aa, #00b894);
            color: black;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            width: 100%;
        }
        .signal { font-size: 32px; font-weight: bold; text-align:center; padding: 15px; border-radius: 12px; margin:15px 0; }
        .buy { background: #00c853; color: black; }
        .sell { background: #f44336; color: white; }
        .favorability {
            height: 12px;
            background: #333;
            border-radius: 999px;
            overflow: hidden;
            margin: 10px 0;
        }
        .bar { height: 100%; background: linear-gradient(to right, #00c853, #ffd700); }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 AI Chart Screener</h1>
        <p>Professional Signal Analyzer</p>
    </div>

    <div class="card">
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="fileInput" accept="image/*" style="margin-bottom:15px;" required>
            <button type="submit">Analyze Screenshot</button>
        </form>
    </div>

    <div id="result" class="card" style="display:none;"></div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('file', document.getElementById('fileInput').files[0]);

            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            const div = document.getElementById('result');

            if (data.status === "success") {
                const a = data.analysis;
                const a = data.analysis;

                const signal = a.signal || "NO TRADE";

                let signalClass = "sell";
            
            if (signal.includes("BUY")) signalClass = "buy";

            if (signal === "NO TRADE") signalClass = "";

                div.innerHTML = `
                     <h2>${signal}</h2>
    
                     <div class="signal ${signalClass}">
                    ${signal}
                </div>

                     <p><strong>Confidence:</strong> ${a.confidence}</p>
                     <p><strong>Score:</strong> ${a.score}</p>

                   ${a.reasons && a.reasons.length ? 
                    `<p><strong>Reasons:</strong> ${a.reasons.join(' • ')}</p>` 
          : ''}

                     <p><strong>Detected Prices:</strong> ${a.numbers_detected ? a.numbers_detected.join(', ') : ''}</p>

                     <p style="font-size:0.8em;opacity:0.6;">
                     ${a.raw_text || 'No text detected'}
                     </p>
            `;
            } else {
                div.innerHTML = `<p style="color:#ff5252">Error: ${data.error}</p>`;
            }
            div.style.display = 'block';
        });
    </script>
</body>
</html>
