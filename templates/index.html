<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart Screener Bot</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; }
        .upload-area { border: 3px dashed #007bff; padding: 50px; text-align: center; border-radius: 12px; }
        button { padding: 12px 30px; font-size: 18px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .result { margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>📈 Trading Chart Screener Bot</h1>
    <p>Upload a screenshot of any trading chart</p>
    
    <div class="upload-area">
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="fileInput" accept="image/*" required><br><br>
            <button type="submit">Analyze Chart →</button>
        </form>
    </div>

    <div id="result" class="result" style="display:none;"></div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('file', document.getElementById('fileInput').files[0]);

            const res = await fetch('/upload', { method: 'POST', body: formData });
            const data = await res.json();
            const div = document.getElementById('result');
            
            if (data.status === "success") {
                div.innerHTML = `<h2>✅ Analysis Result</h2>
                <strong>Trend:</strong> ${data.analysis.trend}<br>
                <strong>Confidence:</strong> ${data.analysis.confidence}<br><br>
                <strong>Extracted Text:</strong><br>${data.analysis.extracted_text || 'None'}`;
            } else {
                div.innerHTML = `<strong style="color:red">Error: ${data.error}</strong>`;
            }
            div.style.display = 'block';
        });
    </script>
</body>
</html>
