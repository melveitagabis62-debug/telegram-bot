<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chart Screener</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            margin: 0;
            padding: 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .card {
            background: #16161f;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(135deg, #00d4aa, #00b894);
            color: black;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            width: 100%;
        }

        .signal {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
        }

        .buy {
            background: #00c853;
            color: black;
        }

        .sell {
            background: #f44336;
            color: white;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>📊 AI Chart Screener</h1>
        <p>Professional Signal Analyzer</p>
    </div>

    <div class="card">
        <form id="uploadForm">
            <input type="file" id="fileInput" accept="image/*" style="margin-bottom:15px;" required>
            <button type="submit">Analyze Screenshot</button>
        </form>
    </div>

    <div id="result" class="card" style="display:none;"></div>

<script>
async function uploadImage() {
    const fileInput = document.getElementById("fileInput");

    if (!fileInput.files.length) {
        alert("Select a file first");
        return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const res = await fetch("/upload", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        console.log(data); // 👈 DEBUG

        document.getElementById("signal").innerText = data.signal || "ERROR";
        document.getElementById("imageTrend").innerText = data.image_trend || "N/A";
        document.getElementById("dataTrend").innerText = data.data_trend || "N/A";
        document.getElementById("candleBias").innerText = data.candle_bias || "N/A";
        document.getElementById("rsi").innerText = data.rsi ?? "N/A";

    } catch (err) {
        alert("Server error");
        console.error(err);
    }
}
</script>

</body>
</html>
